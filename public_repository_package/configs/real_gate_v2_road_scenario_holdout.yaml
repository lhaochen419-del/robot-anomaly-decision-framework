project:
  name: robot_cirfl_real_gate_v2_road_scenario_holdout
  stage: real_gate_v2
  output_dir: outputs/real_gate_v2
  real_data_available: true
seeds:
- 7
- 13
- 23
device: auto
data:
  source: road
  source_type: real
  dataset_name: RoAD
  path: data/processed/road/road_unified.csv
  window_size: 128
  stride: 64
  feature_cols: []
  label_mode: binary
  label_col: fault_label
  condition_col: condition_id
  run_col: run_id
  trajectory_col: trajectory_id
  fault_episode_col: fault_episode_id
  time_col: t
  normalization:
    method: median_iqr
    clip_quantiles:
    - 0.5
    - 99.5
  metadata:
    dataset_name: RoAD
    robot_platform: collaborative robotic arm in a production line
    sampling_frequency: not specified by adapter
    source_url: https://gitlab.com/AlessioMascolini/roaddataset
    split_unit: run_id / recording
model:
  name: CIRFL_v2
  hidden_dim: 64
  condition_dim: 16
  residual_dim: 48
  n_relation_atoms: 8
  dropout: 0.05
  num_classes: 2
  max_conditions: 16
  min_scale: 0.05
  log_scale_clip: 5.0
  energy_clip: 100000.0
  atom_temperature: 0.7
  loss_weights:
    residual_nll: 1.0
    prototype_ce: 0.75
    condition_invariance: 0.25
    field_consistency: 0.03
    source_sparsity: 0.005
    source_smoothness: 0.01
    atom_diversity: 0.1
    atom_usage_balance: 0.35
    atom_assignment_entropy: 0.15
    zh_zc_covariance: 0.1
    zh_zc_orthogonality: 0.05
    score_separation: 0.35
    score_bce: 0.9
  atom_usage_floor: 0.02
  residual_score_weight: 0.05
  prototype_score_weight: 0.25
  score_margin: 0.75
  axis_score_weight: 2.0
training:
  epochs: 10
  overfit_epochs: 8
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 5.0
  threshold_strategy: target_far_0.10
  class_balanced_loss: true
  grl_max: 1.25
  class_balanced_sampler: true
  auto_orient_score: true
baselines:
  require_real_booster: true
  epochs: 3
  batch_size: 64
  learning_rate: 0.001
  methods:
  - random_forest
  - xgboost
  - lightgbm
  - isolation_forest
  - autoencoder
  - lstm_ae
  - usad
latency:
  warmup: 10
  repeats: 50
review_packet:
  output_dir: progress_for_chatgpt/latest
  generate_figures: false
protocols:
- protocol: scenario_holdout_collision
  family: scenario_holdout
  holdout_scenario: collision
  train_runs:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 12
  - 13
  val_runs:
  - 5
  - 14
  test_runs:
  - 6
  - 10
  notes: Collision anomaly held out from training. Test normal comes from independent
    normal run 6 and normal segments inside run 10.
- protocol: scenario_holdout_weight
  family: scenario_holdout
  holdout_scenario: weight
  train_runs:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 9
  - 10
  - 13
  val_runs:
  - 5
  - 14
  test_runs:
  - 6
  - 11
  - 12
  notes: Weight anomaly held out from training. Test normal comes from independent
    normal runs 6 and 11.
- protocol: scenario_holdout_velocity
  family: scenario_holdout
  holdout_scenario: velocity
  train_runs:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 9
  - 12
  val_runs:
  - 5
  - 10
  test_runs:
  - 6
  - 11
  - 14
  notes: Velocity anomaly held out from training. Test normal comes from independent
    normal runs 6 and 11.
