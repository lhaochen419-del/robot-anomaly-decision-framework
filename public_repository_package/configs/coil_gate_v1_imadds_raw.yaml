project:
  output_dir: outputs/coil_gate_v1
review_packet:
  output_dir: progress_for_chatgpt/latest
raw_windows:
  config: configs/datasets/imadds_roboticarm_raw.yaml
seeds: [7, 13, 23]
device: auto_fastest
coil:
  n_bins: 5
  max_pairs: 8
  top_k: 12
  shrinkage_strength: 20.0
  threshold_strategy: best_f1
  fit_train_cap: 800
  fit_calib_cap: 500
protocols:
  core:
    - imadds_raw_main_binary
    - imadds_raw_source_to_target
    - imadds_raw_leave_target_weight35_out
  robustness:
    - imadds_raw_sensor_missing_10
    - imadds_raw_sensor_missing_20
    - imadds_raw_noise_mild
    - imadds_raw_noise_moderate
  missing_channel_rates:
    imadds_raw_sensor_missing_10: 0.10
    imadds_raw_sensor_missing_20: 0.20
  noise_std:
    imadds_raw_noise_mild: 0.03
    imadds_raw_noise_moderate: 0.08
label_efficiency:
  budgets:
    normal_only: 0.0
    labeled_5pct: 0.05
    labeled_20pct: 0.20
    full_validation: 1.0
  run_tree_budget_baselines: false
