project:
  name: robot_cirfl_real_gate_road
  stage: real_data_gate_v1
  output_dir: outputs/real_gate_road
  real_data_available: true
  status_without_real_data: NEED_DATA

seeds: [7, 13, 23]
device: auto

data:
  source: road
  path: data/processed/road/road_unified.csv
  window_size: 128
  stride: 64
  feature_cols: []
  label_col: fault_label
  condition_col: condition_id
  run_col: run_id
  trajectory_col: trajectory_id
  fault_episode_col: fault_episode_id
  time_col: t
  split:
    train_runs: [0, 1, 2, 3, 4, 5, 9, 12]
    val_runs: [6, 10, 11]
    test_runs: [7, 8, 13, 14]
  cross_condition:
    train_conditions: [0, 1, 3]
    val_conditions: [0, 1, 2]
    test_conditions: [4]
  adapter:
    name: road
    raw_dir: data/raw/road
    max_rows_per_run: null
  metadata:
    dataset_name: RoAD Robotic Arm Dataset
    robot_platform: collaborative robotic arm in a production line
    sampling_frequency: not specified by adapter
    source_url: https://gitlab.com/AlessioMascolini/roaddataset
    split_unit: run_id / recording / anomaly scenario

model:
  name: CIRFL
  hidden_dim: 64
  condition_dim: 16
  residual_dim: 48
  n_relation_atoms: 8
  dropout: 0.05
  num_classes: 6
  max_conditions: 16
  loss_weights:
    residual_nll: 1.0
    prototype_ce: 0.45
    condition_invariance: 0.12
    field_consistency: 0.05
    source_sparsity: 0.01
    source_smoothness: 0.01
    atom_diversity: 0.01

training:
  epochs: 4
  overfit_epochs: 8
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 5.0
  threshold_strategy: target_far_0.10

baselines:
  require_real_booster: true
  prefer_booster: xgboost
  epochs: 3
  batch_size: 64
  learning_rate: 0.001
  methods:
    - random_forest
    - xgboost_or_lightgbm
    - isolation_forest
    - autoencoder
    - lstm_ae
    - usad

latency:
  warmup: 10
  repeats: 50

review_packet:
  output_dir: progress_for_chatgpt/latest
